<svg xmlns="http://www.w3.org/2000/svg" width="175" height="160" viewBox="0 0 175 160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b27"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="175" height="160" rx="10" fill="url(#bg)"/>
  <rect x="1" y="1" width="173" height="158" rx="9" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.8"/>

  <!-- Corner stars -->
  <text x="12" y="22" font-size="11" fill="#8b5cf6" opacity="0.7">✦</text>
  <text x="155" y="22" font-size="11" fill="#8b5cf6" opacity="0.7">✦</text>

  <!-- Trophy emoji -->
  <text x="87" y="62" font-size="40" text-anchor="middle">🤖</text>

  <!-- Rank badge -->
  <rect x="57" y="72" width="61" height="22" rx="11" fill="#8b5cf6" opacity="0.9"/>
  <text x="88" y="87" font-size="11" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold">RANK S</text>

  <!-- Title -->
  <text x="88" y="116" font-size="13" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-weight="bold">AI Builder</text>

  <!-- Subtitle -->
  <text x="88" y="136" font-size="9.5" text-anchor="middle" fill="#8892b0" font-family="Arial, sans-serif">Mock Interview Coach</text>
  
  <!-- Bottom line -->
  <line x1="25" y1="148" x2="150" y2="148" stroke="#8b5cf6" stroke-width="0.5" opacity="0.4"/>
</svg>